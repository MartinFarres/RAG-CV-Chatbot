# El Secret retrieval-api-secrets NO va committeado en este repo.
# Crearlo antes de aplicar el resto de este archivo con:
#
#   kubectl create secret generic retrieval-api-secrets \
#     --from-literal=DATABASE_URL=postgresql+asyncpg://<usuario>:<password>@postgresql:5432/<nombre-db> \
#     --from-literal=GROQ_API_KEY=<tu-groq-api-key> \
#     -n rag-chatbot
#
# El usuario/password/db deben coincidir con los que se usaron para
# crear postgres-credentials en 01-postgresql.yaml.
# Ver README.md > "Kubernetes Deployment" para el detalle completo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: retrieval-api-config
  namespace: rag-chatbot
data:
  EMBEDDING_MODEL_NAME: "Qwen/Qwen3-Embedding-0.6B"
  LLM_MODEL: "llama-3.3-70b-versatile"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-api
  namespace: rag-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retrieval-api
  template:
    metadata:
      labels:
        app: retrieval-api
    spec:
      containers:
        - name: retrieval-api
          image: martinfarres/rag-cv-retrieval-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: retrieval-api-secrets
            - configMapRef:
                name: retrieval-api-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 750m
              memory: 1.5Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: retrieval-api
  namespace: rag-chatbot
spec:
  selector:
    app: retrieval-api
  ports:
    - port: 8000
      targetPort: 8000
  # ClusterIP: no expuesto directo afuera, solo via el proxy
  type: ClusterIP
