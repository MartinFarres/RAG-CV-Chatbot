# El Secret postgres-credentials NO va committeado en este repo.
# Crearlo antes de aplicar el resto de este archivo con:
#
#   kubectl create secret generic postgres-credentials \
#     --from-literal=POSTGRES_USER=<usuario> \
#     --from-literal=POSTGRES_PASSWORD=<password> \
#     --from-literal=POSTGRES_DB=<nombre-db> \
#     -n rag-chatbot
#
# Ver README.md > "Kubernetes Deployment" para el detalle completo.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: rag-chatbot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: rag-chatbot
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 750m
              memory: 1.5Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "raguser", "-d", "ragdb"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "raguser", "-d", "ragdb"]
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: rag-chatbot
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
  # ClusterIP: solo accesible dentro del cluster, nunca expuesto afuera
  type: ClusterIP
